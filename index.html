<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deko Trading</title>

<style>
body{
  background:#0f172a;
  color:white;
  font-family:Arial;
}
.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:5px;
}
.day{
  padding:10px;
  border:1px solid #333;
  cursor:pointer;
  text-align:center;
}
.day:hover{
  background:#1e293b;
}
.sel{
  background:#22c55e;
}
img{
  width:100%;
  margin-top:10px;
}
</style>

</head>

<body>

<h2>Operativa</h2>

<input type="month" id="month">
<input type="date" id="date">

<div class="calendar" id="cal"></div>

<img id="img">

<script>

const cal = document.getElementById("cal")
const img = document.getElementById("img")
const monthInput = document.getElementById("month")
const dateInput = document.getElementById("date")

function getImg(date){
  const [y,m,d] = date.split("-")
  return `assets/operativa/${y}-${m}-${d}_DHTS.png`
}

function renderImg(date){
  const path = getImg(date)
  img.src = path

  img.onerror = () => {
    img.style.display = "none"
  }

  img.onload = () => {
    img.style.display = "block"
  }
}

function renderCal(){

  const [y,m] = monthInput.value.split("-").map(Number)

  const days = new Date(y,m,0).getDate()
  const first = new Date(y,m-1,1)

  let start = first.getDay()
  start = (start + 6) % 7

  cal.innerHTML = ""

  for(let i=0;i<start;i++){
    const empty = document.createElement("div")
    cal.appendChild(empty)
  }

  for(let d=1; d<=days; d++){

    const dd = String(d).padStart(2,"0")
    const mm = String(m).padStart(2,"0")
    const date = `${y}-${mm}-${dd}`

    const el = document.createElement("div")
    el.className = "day"
    el.innerText = d

    el.onclick = () => {
      dateInput.value = date
      renderImg(date)

      document.querySelectorAll(".day").forEach(x=>x.classList.remove("sel"))
      el.classList.add("sel")
    }

    cal.appendChild(el)
  }
}

monthInput.value = new Date().toISOString().slice(0,7)
dateInput.value = new Date().toISOString().slice(0,10)

renderCal()
renderImg(dateInput.value)

monthInput.onchange = renderCal

</script>

</body>
</html>
