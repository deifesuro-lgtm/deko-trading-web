<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deko Trading</title>

<style>
body{
  margin:0;
  background:#0f172a;
  color:white;
  font-family:Arial;
}

/* HEADER */
header{
  text-align:center;
  padding:20px;
  font-size:24px;
  font-weight:bold;
  background:#020617;
  border-bottom:1px solid #1e293b;
}

/* LAYOUT */
.container{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:20px;
  padding:20px;
}

/* CALENDAR */
.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:5px;
  margin-top:10px;
}
.day{
  padding:10px;
  border:1px solid #334155;
  cursor:pointer;
  text-align:center;
  border-radius:6px;
}
.day:hover{
  background:#1e293b;
}
.sel{
  background:#22c55e;
  color:black;
}

/* IMAGE */
img{
  width:100%;
  margin-top:15px;
  border-radius:10px;
}

/* FORM */
.form{
  background:#020617;
  padding:15px;
  border-radius:10px;
  display:grid;
  gap:10px;
  border:1px solid #1e293b;
}

.form h3{
  margin:0 0 10px 0;
}

select,input{
  padding:8px;
  border-radius:5px;
  border:none;
}

button{
  padding:10px;
  background:#22c55e;
  border:none;
  font-weight:bold;
  cursor:pointer;
  border-radius:5px;
}
</style>

</head>

<body>

<header>DEKO TRADING</header>

<div class="container">

<!-- IZQUIERDA -->
<div>

<input type="month" id="month">
<input type="date" id="date">

<div class="calendar" id="cal"></div>

<img id="img">

</div>

<!-- DERECHA -->
<div class="form">

<h3>Operativa</h3>

<select id="resultado">
<option value="">Resultado</option>
<option>Stop Loss</option>
<option>Target</option>
</select>

<select id="direccion">
<option value="">Dirección</option>
<option>Compra</option>
<option>Venta</option>
</select>

<select id="entrada">
<option value="">Entrada</option>
<option>Largo</option>
<option>Corto</option>
</select>

<input value="2:1" readonly>

<input id="puntos" placeholder="Puntos">

<select id="sesion">
<option>New York</option>
<option>London</option>
</select>

<select id="gestion">
<option value="">Gestión</option>
<option>Mal usado</option>
<option>Ejecutado</option>
</select>

<select id="feeling">
<option value="">Feeling</option>
<option>Venganza</option>
<option>FOMO</option>
<option>Ansiedad</option>
<option>Neutro</option>
<option>Certeza</option>
<option>Profesional</option>
</select>

<select id="manto">
<option value="">Manto</option>
<option>Si</option>
<option>No</option>
</select>

<button onclick="guardar()">Guardar</button>

</div>

</div>

<script>

const cal = document.getElementById("cal")
const img = document.getElementById("img")
const monthInput = document.getElementById("month")
const dateInput = document.getElementById("date")

function getImg(date){
  const [y,m,d] = date.split("-")
  return `assets/operativa/${y}-${d}-${m}_DHTS.png`
}

function renderImg(date){
  const path = getImg(date)
  img.src = path
  img.onerror = ()=> img.style.display="none"
  img.onload = ()=> img.style.display="block"
}

function renderCal(){
  const [y,m] = monthInput.value.split("-").map(Number)
  const days = new Date(y,m,0).getDate()
  const first = new Date(y,m-1,1)
  let start = (first.getDay()+6)%7

  cal.innerHTML=""

  for(let i=0;i<start;i++){
    cal.appendChild(document.createElement("div"))
  }

  for(let d=1; d<=days; d++){
    const dd = String(d).padStart(2,"0")
    const mm = String(m).padStart(2,"0")
    const date = `${y}-${mm}-${dd}`

    const el = document.createElement("div")
    el.className="day"
    el.innerText=d

    el.onclick=()=>{
      dateInput.value=date
      renderImg(date)
      cargar(date)

      document.querySelectorAll(".day").forEach(x=>x.classList.remove("sel"))
      el.classList.add("sel")
    }

    cal.appendChild(el)
  }
}

function guardar(){
  const data = {
    resultado: resultado.value,
    direccion: direccion.value,
    entrada: entrada.value,
    puntos: puntos.value,
    sesion: sesion.value,
    gestion: gestion.value,
    feeling: feeling.value,
    manto: manto.value
  }

  localStorage.setItem(dateInput.value, JSON.stringify(data))
  alert("Guardado")
}

function cargar(date){
  const data = JSON.parse(localStorage.getItem(date) || "{}")

  resultado.value = data.resultado || ""
  direccion.value = data.direccion || ""
  entrada.value = data.entrada || ""
  puntos.value = data.puntos || ""
  sesion.value = data.sesion || "New York"
  gestion.value = data.gestion || ""
  feeling.value = data.feeling || ""
  manto.value = data.manto || ""
}

// INIT
const today = new Date()
monthInput.value = today.toISOString().slice(0,7)
dateInput.value = today.toISOString().slice(0,10)

renderCal()
renderImg(dateInput.value)
cargar(dateInput.value)

monthInput.onchange = renderCal

</script>

</body>
</html>
